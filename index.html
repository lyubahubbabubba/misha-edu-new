<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Миша EDU">
<meta name="theme-color" content="#6C5CE7">
<link rel="manifest" href="manifest.json">
<title>Миша EDU</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F0EEFF;
  --card: #FFFFFF;
  --text: #2D3047;
  --text-light: #8B8BA7;
  --purple: #6C5CE7;
  --purple-light: #A29BFE;
  --orange: #FD7B33;
  --orange-bg: #FFF3EC;
  --blue: #0984E3;
  --blue-bg: #E8F4FD;
  --green: #00B894;
  --green-bg: #E6F9F3;
  --violet: #A55EEA;
  --violet-bg: #F3EEFE;
  --pink: #E84393;
  --pink-bg: #FDECF4;
  --yellow: #FDCB6E;
  --coral: #FF6B6B;
  --radius: 20px;
  --radius-sm: 14px;
  --shadow: 0 4px 20px rgba(108,92,231,0.1);
  --shadow-card: 0 2px 16px rgba(0,0,0,0.06);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

body {
  font-family: 'Nunito', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: none;
  padding-top: var(--safe-top);
  padding-bottom: calc(80px + var(--safe-bottom));
}

/* ===== HEADER ===== */
.header {
  background: linear-gradient(135deg, #6C5CE7 0%, #A55EEA 50%, #E84393 100%);
  padding: 48px 20px 20px;
  border-radius: 0 0 28px 28px;
  color: white;
  position: relative;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  top: -40px;
  right: -40px;
  width: 140px;
  height: 140px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
}

.header::after {
  content: '';
  position: absolute;
  bottom: -20px;
  left: 30px;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 1;
}

.header h1 {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: -0.5px;
}

.header .day-badge {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
}

.date-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-top: 16px;
  position: relative;
  z-index: 1;
}

.date-arrow {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.12s;
}

.date-arrow:active { transform: scale(0.85); }

.date-display {
  text-align: center;
}

.date-main {
  font-size: 20px;
  font-weight: 800;
}

.date-sub {
  font-size: 12px;
  opacity: 0.8;
  margin-top: 1px;
}

.today-chip {
  display: none;
  margin-top: 8px;
  padding: 5px 16px;
  border-radius: 20px;
  background: white;
  color: var(--purple);
  font-size: 13px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  z-index: 1;
  margin-left: auto;
  margin-right: auto;
}

.today-chip.visible { display: block; }

/* ===== PROGRESS BAR ===== */
.progress-section {
  margin: -14px 20px 0;
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow);
  position: relative;
  z-index: 2;
}

.progress-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.progress-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}

.progress-pct {
  font-size: 14px;
  font-weight: 800;
  color: var(--purple);
}

.progress-track {
  height: 10px;
  background: #F0EEFF;
  border-radius: 5px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #6C5CE7, #E84393);
  border-radius: 5px;
  transition: width 0.5s ease;
}

.progress-bottom {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-size: 12px;
  color: var(--text-light);
}

/* ===== STREAK ===== */
.streak {
  margin: 12px 20px 0;
  padding: 14px 18px;
  background: linear-gradient(135deg, #FDCB6E, #FD7B33);
  border-radius: var(--radius);
  color: white;
  display: none;
  align-items: center;
  gap: 12px;
  box-shadow: 0 4px 16px rgba(253,123,51,0.25);
}

.streak.visible { display: flex; }
.streak-icon { font-size: 30px; }
.streak-text { font-size: 15px; font-weight: 800; }

/* ===== TASK CARDS ===== */
.tasks {
  padding: 14px 20px 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.task {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow-card);
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.15s, box-shadow 0.15s;
  border-left: 5px solid transparent;
}

.task:active { transform: scale(0.98); }

.task[data-skill="reading"] { border-left-color: var(--orange); }
.task[data-skill="math"] { border-left-color: var(--blue); }
.task[data-skill="independence"] { border-left-color: var(--green); }
.task[data-skill="selfregulation"] { border-left-color: var(--violet); }
.task[data-skill="emotional"] { border-left-color: var(--pink); }

.task-emoji {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}

.task[data-skill="reading"] .task-emoji { background: var(--orange-bg); }
.task[data-skill="math"] .task-emoji { background: var(--blue-bg); }
.task[data-skill="independence"] .task-emoji { background: var(--green-bg); }
.task[data-skill="selfregulation"] .task-emoji { background: var(--violet-bg); }
.task[data-skill="emotional"] .task-emoji { background: var(--pink-bg); }

.task-content { flex: 1; min-width: 0; }

.task-label {
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.task[data-skill="reading"] .task-label { color: var(--orange); }
.task[data-skill="math"] .task-label { color: var(--blue); }
.task[data-skill="independence"] .task-label { color: var(--green); }
.task[data-skill="selfregulation"] .task-label { color: var(--violet); }
.task[data-skill="emotional"] .task-label { color: var(--pink); }

.task-desc {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.35;
  margin-top: 2px;
}

.task-toggle {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 3px solid #DDD;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.task.done { opacity: 0.65; }
.task.done .task-desc { text-decoration: line-through; text-decoration-color: rgba(0,0,0,0.15); }

.task.done .task-toggle {
  background: var(--green);
  border-color: var(--green);
  transform: scale(1.1);
}

.task.done .task-toggle::after {
  content: '✓';
  color: white;
  font-size: 15px;
  font-weight: 900;
}

/* ===== MORE BUTTON ===== */
.more-btn {
  display: none;
  margin-top: 6px;
  padding: 6px 14px;
  border: none;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 700;
  font-family: 'Nunito', sans-serif;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.15s;
  color: white;
}
.more-btn:active { transform: scale(0.93); }
.task.done .more-btn { display: inline-block; }
.task[data-skill="reading"] .more-btn { background: var(--orange); }
.task[data-skill="math"] .more-btn { background: var(--blue); }
.task[data-skill="independence"] .more-btn { background: var(--green); }
.task[data-skill="selfregulation"] .more-btn { background: var(--violet); }
.task[data-skill="emotional"] .more-btn { background: var(--pink); }
.task[data-skill="writing"] .more-btn { background: var(--coral); }

/* ===== BONUS TASKS ===== */
.bonus-list {
  margin-top: 6px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.bonus-item {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-light);
  padding: 4px 0;
  display: flex;
  align-items: center;
  gap: 6px;
}

.bonus-item::before {
  content: '★';
  font-size: 11px;
}

/* ===== WRITING SKILL ===== */
.task[data-skill="writing"] { border-left-color: var(--coral); }
.task[data-skill="writing"] .task-emoji { background: #FFEFEF; }
.task[data-skill="writing"] .task-label { color: var(--coral); }

/* ===== MATH PRACTICE SCREEN ===== */
.math-intro {
  margin: -14px 20px 0;
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow);
  position: relative;
  z-index: 2;
  text-align: center;
}

.math-score {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-light);
}

.math-score b {
  color: var(--green);
  font-size: 18px;
}

.math-list {
  padding: 14px 20px 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.math-problem {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--shadow-card);
  display: flex;
  align-items: center;
  gap: 8px;
  border-left: 5px solid var(--blue);
  transition: border-color 0.3s, transform 0.2s, background 0.3s;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.math-problem.active {
  border-left-color: var(--purple);
  background: #F3EEFE;
  box-shadow: 0 4px 20px rgba(108,92,231,0.2);
}

.math-problem.correct {
  border-left-color: var(--green);
  background: var(--green-bg);
  cursor: default;
}

.math-problem.wrong {
  border-left-color: var(--coral);
  animation: shake 0.4s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

.math-num {
  font-size: 13px;
  font-weight: 800;
  color: var(--blue);
  background: var(--blue-bg);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.math-problem.correct .math-num {
  background: var(--green);
  color: white;
}

.math-problem.active .math-num {
  background: var(--purple);
  color: white;
}

.math-expr {
  font-size: 26px;
  font-weight: 900;
  color: var(--text);
  flex: 1;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.math-expr .math-blank {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 48px;
  height: 44px;
  border: 3px dashed var(--purple-light);
  border-radius: 12px;
  background: rgba(162,155,254,0.1);
  font-size: 26px;
  font-weight: 900;
  color: var(--purple);
  transition: all 0.2s;
  padding: 0 6px;
}

.math-problem.active .math-blank {
  border-color: var(--purple);
  background: rgba(108,92,231,0.12);
  box-shadow: 0 0 0 3px rgba(108,92,231,0.15);
}

.math-problem.correct .math-blank {
  border-color: var(--green);
  background: rgba(0,184,148,0.1);
  color: var(--green);
  border-style: solid;
}

.math-check-icon {
  font-size: 22px;
  width: 28px;
  text-align: center;
  flex-shrink: 0;
}

/* Number pad */
.math-numpad {
  display: none;
  position: fixed;
  bottom: calc(80px + var(--safe-bottom));
  left: 0;
  right: 0;
  z-index: 50;
  background: linear-gradient(to bottom, rgba(240,238,255,0.95), rgba(240,238,255,1));
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 12px 16px 14px;
  border-top: 2px solid rgba(108,92,231,0.15);
  box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
}

.math-numpad.visible {
  display: block;
}

.numpad-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}

.numpad-btn {
  height: 50px;
  border: none;
  border-radius: 14px;
  font-size: 26px;
  font-weight: 900;
  font-family: 'Nunito', sans-serif;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s, box-shadow 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.numpad-btn:active { transform: scale(0.92); }

.numpad-btn.nb-digit {
  background: white;
  color: var(--text);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.numpad-btn.nb-back {
  background: var(--orange-bg);
  color: var(--orange);
  font-size: 24px;
}

.numpad-btn.nb-clear {
  background: #FDE8E8;
  color: var(--coral);
  font-size: 16px;
  font-weight: 800;
}

.numpad-btn.nb-ok {
  background: linear-gradient(135deg, var(--green), #2ecc71);
  color: white;
  font-size: 18px;
  font-weight: 800;
  box-shadow: 0 3px 12px rgba(0,184,148,0.3);
}

.math-refresh {
  margin: 0 20px 20px;
  padding: 16px;
  border: none;
  border-radius: var(--radius);
  background: linear-gradient(135deg, var(--blue), var(--purple));
  color: white;
  font-size: 16px;
  font-weight: 800;
  font-family: 'Nunito', sans-serif;
  width: calc(100% - 40px);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 4px 16px rgba(9,132,227,0.3);
  transition: transform 0.15s;
}

.math-refresh:active { transform: scale(0.97); }

/* ===== READING PRACTICE ===== */
.read-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.read-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  background: #FAFAFE;
  border-radius: 14px;
  border-left: 4px solid var(--orange);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.2s;
}

.read-item.done {
  border-left-color: var(--green);
  background: var(--green-bg);
  opacity: 0.7;
}

.read-num {
  font-size: 13px;
  font-weight: 800;
  color: var(--orange);
  background: var(--orange-bg);
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.read-item.done .read-num {
  background: var(--green);
  color: white;
}

.read-item.done .read-num::after {
  content: '✓';
}

.read-item.done .read-num span { display: none; }

.read-text {
  font-size: 20px;
  font-weight: 700;
  line-height: 1.4;
  color: var(--text);
}

.read-item.done .read-text {
  text-decoration: line-through;
  text-decoration-color: rgba(0,0,0,0.15);
}

/* ===== RECORDING BUTTONS ===== */
.read-actions {
  display: flex;
  gap: 6px;
  margin-top: 6px;
}

.rec-btn {
  border: none;
  border-radius: 12px;
  padding: 8px 14px;
  font-size: 14px;
  font-weight: 800;
  font-family: 'Nunito', sans-serif;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s, box-shadow 0.1s;
  display: flex;
  align-items: center;
  gap: 5px;
}

.rec-btn:active { transform: scale(0.93); }

.rec-btn.rec-start {
  background: linear-gradient(135deg, #FF6B6B, #E84393);
  color: white;
  box-shadow: 0 2px 10px rgba(232,67,147,0.3);
}

.rec-btn.rec-start.recording {
  background: linear-gradient(135deg, #E84393, #c0392b);
  animation: pulse-rec 1s ease infinite;
}

@keyframes pulse-rec {
  0%, 100% { box-shadow: 0 2px 10px rgba(232,67,147,0.3); }
  50% { box-shadow: 0 2px 20px rgba(232,67,147,0.6); }
}

.rec-btn.rec-play {
  background: linear-gradient(135deg, var(--green), #2ecc71);
  color: white;
  box-shadow: 0 2px 10px rgba(0,184,148,0.3);
}

.rec-btn.rec-play:disabled {
  background: #DDD;
  color: #AAA;
  box-shadow: none;
}

.en-actions {
  display: flex;
  gap: 6px;
  padding: 0 16px 10px;
}

/* ===== ENGLISH NOTEBOOK STYLE ===== */
.en-card {
  margin: 0 20px 14px;
  background: white;
  border-radius: var(--radius);
  padding: 0;
  box-shadow: var(--shadow-card);
  overflow: hidden;
}

.ru-card h3 {
  background: linear-gradient(135deg, #c62828, #e53935);
}

.en-card h3 {
  background: linear-gradient(135deg, #1a237e, #283593);
  color: white;
  font-size: 16px;
  font-weight: 800;
  padding: 14px 18px;
  margin: 0;
  text-align: center;
  letter-spacing: 0.5px;
}

.en-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.en-item {
  padding: 14px 16px;
  background: white;
  border-bottom: 2px solid #e8eaf6;
  display: flex;
  flex-direction: column;
  gap: 8px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.2s;
}

.en-item:last-child { border-bottom: none; }
.en-item.done { background: #e8f5e9; }

.en-top {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}

.en-item-num {
  font-size: 36px;
  font-weight: 900;
  color: #2e7d32;
  line-height: 1;
  flex-shrink: 0;
  min-width: 40px;
}

.en-item-text {
  font-size: 22px;
  font-weight: 800;
  line-height: 1.45;
  color: #1a237e;
  flex: 1;
  background: repeating-linear-gradient(
    transparent, transparent 30px, #c8e0f4 30px, #c8e0f4 31px
  );
  background-position: 0 6px;
  padding-bottom: 4px;
}

.en-item-text .sw { color: #d32f2f; font-weight: 900; }
.en-item-text .sw2 { color: #7b1fa2; font-weight: 900; }

.en-scene {
  width: 100%;
  height: 80px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 50px;
  letter-spacing: 8px;
  position: relative;
}

.en-scene.bg1 { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); }
.en-scene.bg2 { background: linear-gradient(135deg, #e3f2fd, #bbdefb); }
.en-scene.bg3 { background: linear-gradient(135deg, #fff3e0, #ffe0b2); }
.en-scene.bg4 { background: linear-gradient(135deg, #fce4ec, #f8bbd0); }
.en-scene.bg5 { background: linear-gradient(135deg, #f3e5f5, #e1bee7); }
.en-scene.bg6 { background: linear-gradient(135deg, #e0f7fa, #b2ebf2); }

.en-check {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s;
  background: rgba(255,255,255,0.3);
}

.en-item.done .en-check {
  background: var(--green);
  border-color: var(--green);
}

.en-item.done .en-check::after {
  content: '✓';
  color: white;
  font-size: 15px;
  font-weight: 900;
}

function ds(d){return d.toISOString().split('T')[0];}
function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function fmt(s){const d=pd(s),mn=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'],wd=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];return `${wd[d.getDay()]}, ${d.getDate()} ${mn[d.getMonth()]}`;}
function df(a,b){return Math.round((pd(b)-pd(a))/864e5);}
function td(){return ds(new Date());}
function h(s){let v=0;for(let i=0;i<s.length;i++){v=((v<<5)-v)+s.charCodeAt(i);v|=0;}return Math.abs(v);}
function tf(d,k){const p=D.phases[k]||1,pool=SKILLS[k].phases[p];return pool[h(d+k)%pool.length];}
function gd(d){
  if(!D.days[d]){const t={};SK.forEach(k=>t[k]={text:tf(d,k),done:false});D.days[d]={tasks:t,mood:0,note:''};sv(D);}
  // migrate old task texts
  const dd=D.days[d];
  SK.forEach(k=>{if(dd.tasks[k]){const fresh=tf(d,k);if(fresh!==dd.tasks[k].text && !dd.tasks[k].done){dd.tasks[k].text=fresh;}}});
  return dd;
}

function addBonus(date,k){

  const p=D.phases[k]||1,pool=SKILLS[k].phases[p];
  const used=new Set([task.text,...task.bonus]);
  const avail=pool.filter(t=>!used.has(t));
  if(!avail.length){task.bonus.push(pool[Math.floor(Math.random()*pool.length)]+' (повтор)');}
  else{task.bonus.push(avail[h(date+k+task.bonus.length)%avail.length]);}
  sv(D);render();
}

let mathProblems = [];
let mathActive = -1; // index of active problem
let mathBuffer = ''; // current typed digits

function genMathProblems(){
  mathProblems = [];
  mathActive = -1;
  mathBuffer = '';
  for(let i=0;i<10;i++){
    // Types: 0 = a+b=?, 1 = a-b=?, 2 = ?+b=c, 3 = a+?=c, 4 = ?-b=c (show as c=?-b... no), 5 = a-?=c
    const type = Math.floor(Math.random()*6);
    let a,b,answer,op,missing;
    if(type===0){
      // a + b = ?
      a=1+Math.floor(Math.random()*14); b=1+Math.floor(Math.random()*Math.min(20-a,14));
      answer=a+b; op='+'; missing='result';
    } else if(type===1){
      // a - b = ?
      a=3+Math.floor(Math.random()*17); b=1+Math.floor(Math.random()*(a-1));
      answer=a-b; op='−'; missing='result';
    } else if(type===2){
      // ? + b = c
      const c=3+Math.floor(Math.random()*17); b=1+Math.floor(Math.random()*(c-1));
      a=c-b; answer=a; op='+'; missing='first';
      mathProblems.push({a,b,c,answer,op,missing,userAnswer:'',correct:null});
      continue;
    } else if(type===3){
      // a + ? = c
      const c=3+Math.floor(Math.random()*17); a=1+Math.floor(Math.random()*(c-1));
      b=c-a; answer=b; op='+'; missing='second';
      mathProblems.push({a,b,c,answer,op,missing,userAnswer:'',correct:null});
      continue;
    } else if(type===4){
      // c - ? = b  →  answer is the subtracted number
      a=3+Math.floor(Math.random()*17); b=1+Math.floor(Math.random()*(a-1));
      const result=a-b; answer=b; op='−'; missing='second';
      mathProblems.push({a,b:b,c:result,answer,op,missing,userAnswer:'',correct:null});
      continue;
    } else {
      // ? - b = c  →  answer is the first number
      const c=1+Math.floor(Math.random()*14); b=1+Math.floor(Math.random()*Math.min(14,19-c));
      a=c+b; answer=a; op='−'; missing='first';
      mathProblems.push({a,b,c,answer,op,missing,userAnswer:'',correct:null});
      continue;
    }
    mathProblems.push({a,b,c:answer,answer,op,missing,userAnswer:'',correct:null});
  }
}

function mathExprHTML(p){
  const blank = `<span class="math-blank">${p.correct?p.answer:(p.userAnswer||'?')}</span>`;
  if(p.missing==='first'){
    return `${blank} ${p.op} ${p.b} = ${p.c}`;
  } else if(p.missing==='second'){
    return `${p.a} ${p.op} ${blank} = ${p.c}`;
  } else {
    return `${p.a} ${p.op} ${p.b} = ${blank}`;
  }
}

function renderMath(){
  if(!mathProblems.length) genMathProblems();
  const list=document.getElementById('math-list');
  list.innerHTML='';
  mathProblems.forEach((p,i)=>{
    const div=document.createElement('div');
    let cls='math-problem';
    if(p.correct===true) cls+=' correct';
    if(p.correct===false) cls+=' wrong';
    if(i===mathActive && !p.correct) cls+=' active';
    div.className=cls;
    div.innerHTML=`<div class="math-expr">${mathExprHTML(p)}</div><div class="math-check-icon">${p.correct===true?'✅':p.correct===false?'❌':''}</div>`;
    if(!p.correct){
      div.addEventListener('click',()=>{
        mathActive=i;
        mathBuffer=p.userAnswer||'';
        renderMath();
        document.getElementById('math-numpad').classList.add('visible');
        // scroll problem into view
        setTimeout(()=>div.scrollIntoView({behavior:'smooth',block:'center'}),100);
      });
    }
    list.appendChild(div);
  });
  updateMathScore();
  // auto-show numpad if there's an active problem
  const pad=document.getElementById('math-numpad');
  if(mathActive>=0 && !mathProblems[mathActive].correct){
    pad.classList.add('visible');
    list.style.paddingBottom='240px';
  } else {
    list.style.paddingBottom='';
  }
}

function updateMathScore(){
  const solved=mathProblems.filter(p=>p.correct).length;
  document.getElementById('m-score').innerHTML='Решено: <b>'+solved+'</b> из <b>10</b>';
}

function mathCheckAnswer(){
  if(mathActive<0) return;
  const p=mathProblems[mathActive];
  if(!mathBuffer) return;
  const v=parseInt(mathBuffer);
  p.userAnswer=mathBuffer;
  if(v===p.answer){
    p.correct=true;
    mathBuffer='';
    // find next unsolved
    let next=-1;
    for(let j=mathActive+1;j<mathProblems.length;j++){if(!mathProblems[j].correct){next=j;break;}}
    if(next===-1) for(let j=0;j<mathActive;j++){if(!mathProblems[j].correct){next=j;break;}}
    mathActive=next;
    if(next>=0) mathBuffer=mathProblems[next].userAnswer||'';
    renderMath();
    if(mathProblems.every(x=>x.correct)){
      document.getElementById('math-numpad').classList.remove('visible');
      confetti();celebrate();
    }
  } else {
    p.correct=false;
    renderMath();
    setTimeout(()=>{
      p.correct=null;
      p.userAnswer='';
      mathBuffer='';
      renderMath();
    },800);
  }
}

// Numpad event delegation
document.getElementById('math-numpad').addEventListener('click',e=>{
  const btn=e.target.closest('.numpad-btn');
  if(!btn) return;
  const d=btn.dataset.d;
  if(mathActive<0||mathProblems[mathActive].correct) return;
  if(d==='back'){
    mathBuffer=mathBuffer.slice(0,-1);
    mathProblems[mathActive].userAnswer=mathBuffer;
    renderMath();
  } else if(d==='clear'){
    mathBuffer='';
    mathProblems[mathActive].userAnswer='';
    renderMath();
  } else if(d==='ok'){
    mathCheckAnswer();
  } else if(d==='10'){
    // quick-enter for teens: show 10-19 submenu or just type '1'+'0'
    if(mathBuffer.length<2){mathBuffer+='1';mathBuffer+='0';}
    mathProblems[mathActive].userAnswer=mathBuffer;
    renderMath();
  } else {
    if(mathBuffer.length<2){mathBuffer+=d;}
    mathProblems[mathActive].userAnswer=mathBuffer;
    renderMath();
  }
});

document.getElementById('math-new').addEventListener('click',()=>{
  genMathProblems();
  document.getElementById('math-numpad').classList.remove('visible');
  renderMath();
});

let readState = {ru:[],en:[]};
let activeRecorder = null;
let activeRecIdx = null;

const SIGHT_WORDS = new Set(['the','a','an','is','am','are','was','were','i','he','she','it','we','they','my','his','her','to','and','of','do','no','so','or','but','not','can','has','had','have','will','all','this','that','with','from','what','when','said']);
const PREPOSITIONS = new Set(['in','on','at','up','to','by','for','from','with','into','onto']);

function highlightEn(text){
  return text.split(' ').map(w=>{
    const clean=w.replace(/[^a-zA-Z]/g,'').toLowerCase();
    const punct=w.replace(/[a-zA-Z]/g,'');
    if(SIGHT_WORDS.has(clean)) return `<span class="sw">${w}</span>`;
    if(PREPOSITIONS.has(clean)) return `<span class="sw2">${w}</span>`;
    return w;
  }).join(' ');
}

function pickSentences(){
  const usedRu=new Set(), usedEn=new Set();
  readState.ru=[];readState.en=[];
  while(readState.ru.length<5){const i=Math.floor(Math.random()*SENTENCES_RU.length);if(!usedRu.has(i)){usedRu.add(i);readState.ru.push({text:SENTENCES_RU[i].t,emoji:SENTENCES_RU[i].e,bg:SENTENCES_RU[i].bg||1,done:false});}}
  while(readState.en.length<5){const i=Math.floor(Math.random()*SENTENCES_EN.length);if(!usedEn.has(i)){usedEn.add(i);readState.en.push({text:SENTENCES_EN[i].t,emoji:SENTENCES_EN[i].e,bg:SENTENCES_EN[i].bg||1,done:false});}}
}

function startRec(key, i){
  // key = 'ru' or 'en', i = sentence index
  const id = key+i;
  if(activeRecorder && activeRecIdx===id){
    // stop recording
    activeRecorder.stop();
    return;
  }
  if(activeRecorder){activeRecorder.stop();}
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    const mr = new MediaRecorder(stream);
    const chunks = [];
    mr.ondataavailable = e => chunks.push(e.data);
    mr.onstop = () => {
      stream.getTracks().forEach(t=>t.stop());
      const blob = new Blob(chunks, {type:'audio/webm'});
      const url = URL.createObjectURL(blob);
      readState[key][i].audioURL = url;
      activeRecorder = null;
      activeRecIdx = null;
      renderReading();
    };
    mr.start();
    activeRecorder = mr;
    activeRecIdx = id;
    renderReading();
  }).catch(()=>{alert('Разреши доступ к микрофону 🎙️');});
}

function playRec(key, i){
  const url = readState[key][i].audioURL;
  if(!url) return;
  const a = new Audio(url);
  a.play();
}

function renderReading(){
  if(!readState.ru.length) pickSentences();
  // Russian — same card style as English
  const ruEl=document.getElementById('read-ru');
  ruEl.innerHTML='';
  readState.ru.forEach((s,i)=>{
    const div=document.createElement('div');
    div.className='en-item'+(s.done?' done':'');
    const isRec = activeRecIdx==='ru'+i;
    const hasAudio = !!s.audioURL;
    div.innerHTML=`<div class="en-top"><div class="en-item-num">${i+1}.</div><div class="en-item-text" style="color:#c62828">${s.text}</div></div><div class="en-scene bg${s.bg||1}"><span>${s.emoji||''}</span><div class="en-check"></div></div><div class="en-actions"><button class="rec-btn rec-start${isRec?' recording':''}" data-rec="ru-${i}">${isRec?'⏹ Стоп':'🎙️ Запись'}</button><button class="rec-btn rec-play" data-play="ru-${i}" ${hasAudio?'':'disabled'}>▶️ ${hasAudio?'Слушать':'—'}</button></div>`;
    div.querySelector('.en-top').addEventListener('click',()=>{s.done=!s.done;renderReading();checkAllRead();});
    div.querySelector('.en-scene').addEventListener('click',()=>{s.done=!s.done;renderReading();checkAllRead();});
    div.querySelector('[data-rec]').addEventListener('click',e=>{e.stopPropagation();startRec('ru',i);});
    div.querySelector('[data-play]').addEventListener('click',e=>{e.stopPropagation();playRec('ru',i);});
    ruEl.appendChild(div);
  });
  // English — notebook style
  const enEl=document.getElementById('read-en');
  enEl.innerHTML='';
  readState.en.forEach((s,i)=>{
    const div=document.createElement('div');
    div.className='en-item'+(s.done?' done':'');
    const isRec = activeRecIdx==='en'+i;
    const hasAudio = !!s.audioURL;
    div.innerHTML=`<div class="en-top"><div class="en-item-num">${i+1}.</div><div class="en-item-text">${highlightEn(s.text)}</div></div><div class="en-scene bg${s.bg||1}"><span>${s.emoji||''}</span><div class="en-check"></div></div><div class="en-actions"><button class="rec-btn rec-start${isRec?' recording':''}" data-rec="en-${i}">${isRec?'⏹ Stop':'🎙️ Record'}</button><button class="rec-btn rec-play" data-play="en-${i}" ${hasAudio?'':'disabled'}>▶️ ${hasAudio?'Play':'—'}</button></div>`;
    div.querySelector('.en-top').addEventListener('click',()=>{s.done=!s.done;renderReading();checkAllRead();});
    div.querySelector('.en-scene').addEventListener('click',()=>{s.done=!s.done;renderReading();checkAllRead();});
    div.querySelector('[data-rec]').addEventListener('click',e=>{e.stopPropagation();startRec('en',i);});
    div.querySelector('[data-play]').addEventListener('click',e=>{e.stopPropagation();playRec('en',i);});
    enEl.appendChild(div);
  });
}

function checkAllRead(){
  if(readState.ru.every(x=>x.done)&&readState.en.every(x=>x.done)){confetti();celebrate();}
}
