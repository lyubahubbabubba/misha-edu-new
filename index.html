<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Миша EDU">
<meta name="theme-color" content="#6C5CE7">
<link rel="manifest" href="manifest.json">
<title>Миша EDU</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F0EEFF;
  --card: #FFFFFF;
  --text: #2D3047;
  --text-light: #8B8BA7;
  --purple: #6C5CE7;
  --purple-light: #A29BFE;
  --orange: #FD7B33;
  --orange-bg: #FFF3EC;
  --blue: #0984E3;
  --blue-bg: #E8F4FD;
  --green: #00B894;
  --green-bg: #E6F9F3;
  --violet: #A55EEA;
  --violet-bg: #F3EEFE;
  --pink: #E84393;
  --pink-bg: #FDECF4;
  --yellow: #FDCB6E;
  --coral: #FF6B6B;
  --radius: 20px;
  --radius-sm: 14px;
  --shadow: 0 4px 20px rgba(108,92,231,0.1);
  --shadow-card: 0 2px 16px rgba(0,0,0,0.06);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

body {
  font-family: 'Nunito', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: none;
  padding-top: var(--safe-top);
  padding-bottom: calc(80px + var(--safe-bottom));
}

/* ===== HEADER ===== */
.header {
  background: linear-gradient(135deg, #6C5CE7 0%, #A55EEA 50%, #E84393 100%);
  padding: 48px 20px 20px;
  border-radius: 0 0 28px 28px;
  color: white;
  position: relative;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  top: -40px;
  right: -40px;
  width: 140px;
  height: 140px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
}

.header::after {
  content: '';
  position: absolute;
  bottom: -20px;
  left: 30px;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 1;
}

.header h1 {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: -0.5px;
}

.header .day-badge {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
}

.date-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-top: 16px;
  position: relative;
  z-index: 1;
}

.date-arrow {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.12s;
}

.date-arrow:active { transform: scale(0.85); }

.date-display {
  text-align: center;
}

.date-main {
  font-size: 20px;
  font-weight: 800;
}

.date-sub {
  font-size: 12px;
  opacity: 0.8;
  margin-top: 1px;
}

.today-chip {
  display: none;
  margin-top: 8px;
  padding: 5px 16px;
  border-radius: 20px;
  background: white;
  color: var(--purple);
  font-size: 13px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  z-index: 1;
  margin-left: auto;
  margin-right: auto;
}

.today-chip.visible { display: block; }

/* ===== PROGRESS BAR ===== */
.progress-section {
  margin: -14px 20px 0;
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow);
  position: relative;
  z-index: 2;
}

.progress-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.progress-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}

.progress-pct {
  font-size: 14px;
  font-weight: 800;
  color: var(--purple);
}

.progress-track {
  height: 10px;
  background: #F0EEFF;
  border-radius: 5px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #6C5CE7, #E84393);
  border-radius: 5px;
  transition: width 0.5s ease;
}

.progress-bottom {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-size: 12px;
  color: var(--text-light);
}

/* ===== STREAK ===== */
.streak {
  margin: 12px 20px 0;
  padding: 14px 18px;
  background: linear-gradient(135deg, #FDCB6E, #FD7B33);
  border-radius: var(--radius);
  color: white;
  display: none;
  align-items: center;
  gap: 12px;
  box-shadow: 0 4px 16px rgba(253,123,51,0.25);
}

.streak.visible { display: flex; }
.streak-icon { font-size: 30px; }
.streak-text { font-size: 15px; font-weight: 800; }

/* ===== TASK CARDS ===== */
.tasks {
  padding: 14px 20px 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.task {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow-card);
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.15s, box-shadow 0.15s;
  border-left: 5px solid transparent;
}

.task:active { transform: scale(0.98); }

.task[data-skill="reading"] { border-left-color: var(--orange); }
.task[data-skill="math"] { border-left-color: var(--blue); }
.task[data-skill="independence"] { border-left-color: var(--green); }
.task[data-skill="selfregulation"] { border-left-color: var(--violet); }
.task[data-skill="emotional"] { border-left-color: var(--pink); }

.task-emoji {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}

.task[data-skill="reading"] .task-emoji { background: var(--orange-bg); }
.task[data-skill="math"] .task-emoji { background: var(--blue-bg); }
.task[data-skill="independence"] .task-emoji { background: var(--green-bg); }
.task[data-skill="selfregulation"] .task-emoji { background: var(--violet-bg); }
.task[data-skill="emotional"] .task-emoji { background: var(--pink-bg); }

.task-content { flex: 1; min-width: 0; }

.task-label {
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.task[data-skill="reading"] .task-label { color: var(--orange); }
.task[data-skill="math"] .task-label { color: var(--blue); }
.task[data-skill="independence"] .task-label { color: var(--green); }
.task[data-skill="selfregulation"] .task-label { color: var(--violet); }
.task[data-skill="emotional"] .task-label { color: var(--pink); }

.task-desc {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.35;
  margin-top: 2px;
}

.task-toggle {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 3px solid #DDD;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.task.done { opacity: 0.65; }
.task.done .task-desc { text-decoration: line-through; text-decoration-color: rgba(0,0,0,0.15); }

.task.done .task-toggle {
  background: var(--green);
  border-color: var(--green);
  transform: scale(1.1);
}

.task.done .task-toggle::after {
  content: '✓';
  color: white;
  font-size: 15px;
  font-weight: 900;
}

/* ===== MORE BUTTON ===== */
.more-btn {
  display: none;
  margin-top: 6px;
  padding: 6px 14px;
  border: none;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 700;
  font-family: 'Nunito', sans-serif;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.15s;
  color: white;
}
.more-btn:active { transform: scale(0.93); }
.task.done .more-btn { display: inline-block; }
.task[data-skill="reading"] .more-btn { background: var(--orange); }
.task[data-skill="math"] .more-btn { background: var(--blue); }
.task[data-skill="independence"] .more-btn { background: var(--green); }
.task[data-skill="selfregulation"] .more-btn { background: var(--violet); }
.task[data-skill="emotional"] .more-btn { background: var(--pink); }
.task[data-skill="writing"] .more-btn { background: var(--coral); }

/* ===== BONUS TASKS ===== */
.bonus-list {
  margin-top: 6px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.bonus-item {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-light);
  padding: 4px 0;
  display: flex;
  align-items: center;
  gap: 6px;
}

.bonus-item::before {
  content: '★';
  font-size: 11px;
}

/* ===== WRITING SKILL ===== */
.task[data-skill="writing"] { border-left-color: var(--coral); }
.task[data-skill="writing"] .task-emoji { background: #FFEFEF; }
.task[data-skill="writing"] .task-label { color: var(--coral); }

/* ===== MATH PRACTICE SCREEN ===== */
.math-intro {
  margin: -14px 20px 0;
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow);
  position: relative;
  z-index: 2;
  text-align: center;
}

.math-score {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-light);
}

.math-score b {
  color: var(--green);
  font-size: 18px;
}

.math-list {
  padding: 14px 20px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.math-problem {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 20px;
  box-shadow: var(--shadow-card);
  display: flex;
  align-items: center;
  gap: 12px;
  border-left: 5px solid var(--blue);
  transition: border-color 0.3s, transform 0.2s;
}

.math-problem.correct {
  border-left-color: var(--green);
  background: var(--green-bg);
}

.math-problem.wrong {
  border-left-color: var(--coral);
  animation: shake 0.4s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

.math-num {
  font-size: 13px;
  font-weight: 800;
  color: var(--blue);
  background: var(--blue-bg);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.math-problem.correct .math-num {
  background: var(--green);
  color: white;
}

.math-expr {
  font-size: 28px;
  font-weight: 900;
  color: var(--text);
  flex: 1;
  letter-spacing: 1px;
}

.math-eq {
  font-size: 28px;
  font-weight: 900;
  color: var(--text-light);
}

.math-input {
  width: 64px;
  height: 52px;
  border: 3px solid #DDD;
  border-radius: 14px;
  font-size: 28px;
  font-weight: 900;
  font-family: 'Nunito', sans-serif;
  text-align: center;
  color: var(--text);
  background: #FAFAFE;
  -webkit-appearance: none;
  transition: border-color 0.2s;
}

.math-input:focus {
  outline: none;
  border-color: var(--blue);
  background: white;
}

.math-problem.correct .math-input {
  border-color: var(--green);
  background: white;
  color: var(--green);
}

.math-problem.wrong .math-input {
  border-color: var(--coral);
  color: var(--coral);
}

.math-check-icon {
  font-size: 22px;
  width: 28px;
  text-align: center;
  flex-shrink: 0;
}

.math-refresh {
  margin: 0 20px 20px;
  padding: 16px;
  border: none;
  border-radius: var(--radius);
  background: linear-gradient(135deg, var(--blue), var(--purple));
  color: white;
  font-size: 16px;
  font-weight: 800;
  font-family: 'Nunito', sans-serif;
  width: calc(100% - 40px);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 4px 16px rgba(9,132,227,0.3);
  transition: transform 0.15s;
}

.math-refresh:active { transform: scale(0.97); }

/* ===== READING PRACTICE ===== */
.read-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.read-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  background: #FAFAFE;
  border-radius: 14px;
  border-left: 4px solid var(--orange);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.2s;
}

.read-item.done {
  border-left-color: var(--green);
  background: var(--green-bg);
  opacity: 0.7;
}

.read-num {
  font-size: 13px;
  font-weight: 800;
  color: var(--orange);
  background: var(--orange-bg);
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.read-item.done .read-num {
  background: var(--green);
  color: white;
}

.read-item.done .read-num::after {
  content: '✓';
}

.read-item.done .read-num span { display: none; }

.read-text {
  font-size: 20px;
  font-weight: 700;
  line-height: 1.4;
  color: var(--text);
}

.read-item.done .read-text {
  text-decoration: line-through;
  text-decoration-color: rgba(0,0,0,0.15);
}

/* ===== ENGLISH NOTEBOOK STYLE ===== */
.en-card {
  margin: 0 20px 14px;
  background: white;
  border-radius: var(--radius);
  padding: 0;
  box-shadow: var(--shadow-card);
  overflow: hidden;
}

.en-card h3 {
  background: linear-gradient(135deg, #1a237e, #283593);
  color: white;
  font-size: 16px;
  font-weight: 800;
  padding: 14px 18px;
  margin: 0;
  text-align: center;
  letter-spacing: 0.5px;
}

.en-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.en-item {
  padding: 14px 16px;
  background: white;
  border-bottom: 2px solid #e8eaf6;
  display: flex;
  flex-direction: column;
  gap: 8px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.2s;
}

.en-item:last-child { border-bottom: none; }
.en-item.done { background: #e8f5e9; }

.en-top {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}

.en-item-num {
  font-size: 36px;
  font-weight: 900;
  color: #2e7d32;
  line-height: 1;
  flex-shrink: 0;
  min-width: 40px;
}

.en-item-text {
  font-size: 22px;
  font-weight: 800;
  line-height: 1.45;
  color: #1a237e;
  flex: 1;
  background: repeating-linear-gradient(
    transparent, transparent 30px, #c8e0f4 30px, #c8e0f4 31px
  );
  background-position: 0 6px;
  padding-bottom: 4px;
}

.en-item-text .sw { color: #d32f2f; font-weight: 900; }
.en-item-text .sw2 { color: #7b1fa2; font-weight: 900; }

.en-scene {
  width: 100%;
  height: 80px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 50px;
  letter-spacing: 8px;
  position: relative;
}

.en-scene.bg1 { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); }
.en-scene.bg2 { background: linear-gradient(135deg, #e3f2fd, #bbdefb); }
.en-scene.bg3 { background: linear-gradient(135deg, #fff3e0, #ffe0b2); }
.en-scene.bg4 { background: linear-gradient(135deg, #fce4ec, #f8bbd0); }
.en-scene.bg5 { background: linear-gradient(135deg, #f3e5f5, #e1bee7); }
.en-scene.bg6 { background: linear-gradient(135deg, #e0f7fa, #b2ebf2); }

.en-check {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s;
  background: rgba(255,255,255,0.3);
}

.en-item.done .en-check {
  background: var(--green);
  border-color: var(--green);
}

.en-item.done .en-check::after {
  content: '✓';
  color: white;
  font-size: 15px;
  font-weight: 900;
}

.en-item.done .en-item-text { text-decoration: line-through; text-decoration-color: rgba(0,0,0,0.15); }
.en-item.done .en-item-num { color: var(--green); }

/* ===== MOOD & NOTE ===== */
.bottom-card {
  margin: 12px 20px 20px;
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow-card);
}

.mood-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.mood-title {
  font-size: 14px;
  font-weight: 700;
}

.mood-btns {
  display: flex;
  gap: 4px;
}

.mood-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 3px solid transparent;
  background: none;
  font-size: 22px;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  -webkit-tap-highlight-color: transparent;
}

.mood-btn:active { transform: scale(0.8); }

.mood-btn.sel {
  border-color: var(--purple);
  background: var(--bg);
  transform: scale(1.15);
}

.note-area {
  margin-top: 12px;
  width: 100%;
  padding: 10px 14px;
  border: 2px solid #EEE;
  border-radius: 12px;
  font-size: 14px;
  font-family: 'Nunito', sans-serif;
  font-weight: 600;
  background: #FAFAFE;
  resize: none;
  height: 42px;
  color: var(--text);
  transition: border-color 0.2s;
}

.note-area:focus { outline: none; border-color: var(--purple-light); }
.note-area::placeholder { color: #C8C8D4; }

/* ===== TAB BAR ===== */
.tabs {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: calc(80px + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: white;
  display: flex;
  justify-content: space-around;
  align-items: flex-start;
  padding-top: 10px;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
  z-index: 100;
}

.tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 20px;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.15s;
}

.tab:active { transform: scale(0.9); }

.tab-ico {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.2s;
}

.tab.on .tab-ico {
  background: var(--purple);
  font-size: 16px;
  box-shadow: 0 3px 10px rgba(108,92,231,0.3);
}

.tab-txt {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-light);
  transition: color 0.2s;
}

.tab.on .tab-txt { color: var(--purple); }

/* ===== SCREENS ===== */
.scr { display: none; }
.scr.on { display: block; animation: pop 0.25s ease; }

@keyframes pop { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ===== PROGRESS SCREEN ===== */
.stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 14px 20px;
}

.stat {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: var(--shadow-card);
  text-align: center;
}

.stat-num {
  font-size: 36px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.stat-lbl {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-light);
  margin-top: 2px;
}

.sec-card {
  margin: 0 20px 14px;
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: var(--shadow-card);
}

.sec-card h3 {
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 14px;
}

.sk-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.sk-row:last-child { margin-bottom: 0; }
.sk-ico { font-size: 18px; width: 24px; text-align: center; }
.sk-name { font-size: 13px; font-weight: 700; width: 100px; }

.sk-track {
  flex: 1;
  height: 8px;
  background: #F0EEFF;
  border-radius: 4px;
  overflow: hidden;
}

.sk-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s;
}

.sk-pct {
  font-size: 13px;
  font-weight: 800;
  color: var(--text-light);
  width: 36px;
  text-align: right;
}

/* ===== HEATMAP ===== */
.heatmap {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.hm {
  aspect-ratio: 1;
  border-radius: 4px;
  background: #F0EEFF;
}

.hm.full { background: var(--green); }
.hm.partial { background: var(--yellow); }
.hm.future { background: #F8F7FE; }

/* ===== SETTINGS ===== */
.set-group {
  margin: 0 20px 14px;
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-card);
}

.set-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
}

.set-row + .set-row { border-top: 1px solid #F0EEFF; }

.set-left {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
  font-weight: 700;
}

.set-left .ico { font-size: 20px; }

.ph-badge {
  font-size: 13px;
  font-weight: 800;
  padding: 4px 12px;
  border-radius: 10px;
  background: var(--bg);
  color: var(--purple);
  margin-right: 8px;
}

.ph-btn {
  width: 30px;
  height: 30px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, var(--purple), var(--violet));
  color: white;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 3px 8px rgba(108,92,231,0.3);
}

.ph-btn:disabled { background: #E8E8F0; color: #C0C0CC; box-shadow: none; }

.act-btn {
  width: 100%;
  padding: 14px;
  text-align: center;
  font-size: 16px;
  font-weight: 800;
  font-family: 'Nunito', sans-serif;
  border: none;
  background: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.act-btn.accent { color: var(--purple); }
.act-btn.danger { color: var(--coral); }

.sec-header {
  padding: 6px 20px 6px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ===== CONFETTI ===== */
.confetti-box { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; }

.conf {
  position: absolute;
  border-radius: 3px;
  animation: cfall 3.5s ease-out forwards;
}

@keyframes cfall {
  0% { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 1; }
  80% { opacity: 1; }
  100% { transform: translateY(110vh) rotate(1080deg) scale(0.3); opacity: 0; }
}

/* ===== FIREWORKS OVERLAY ===== */
.firework-overlay {
  position: fixed;
  inset: 0;
  z-index: 997;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}

.firework-overlay.show {
  pointer-events: auto;
  opacity: 1;
  background: rgba(45, 48, 71, 0.7);
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  background: white;
  border-radius: 28px;
  padding: 36px 36px 32px;
  text-align: center;
  box-shadow: 0 20px 80px rgba(108,92,231,0.4);
  z-index: 1000;
  opacity: 0;
  transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  max-width: 320px;
  width: 85%;
}

.toast.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}

.toast-emo { font-size: 72px; }
.toast-t { font-size: 26px; font-weight: 900; margin-top: 10px; background: linear-gradient(135deg, var(--purple), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.toast-s { font-size: 18px; color: var(--text); font-weight: 700; margin-top: 6px; }
</style>

const SK = ['reading','math','writing','independence','selfregulation','emotional'];
const S0 = '2026-03-30', G0 = '2026-08-08', KEY = 'misha-edu-data';

function ld(){try{const r=localStorage.getItem(KEY);if(r){const d=JSON.parse(r);if(!d.phases.writing)d.phases.writing=1;return d;}}catch(e){}return{days:{},phases:{reading:1,math:2,writing:1,independence:1,selfregulation:1,emotional:1}};}
function sv(d){localStorage.setItem(KEY,JSON.stringify(d));}
let D=ld();

function ds(d){return d.toISOString().split('T')[0];}
function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function fmt(s){const d=pd(s),mn=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'],wd=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];return `${wd[d.getDay()]}, ${d.getDate()} ${mn[d.getMonth()]}`;}
function df(a,b){return Math.round((pd(b)-pd(a))/864e5);}
function td(){return ds(new Date());}
function h(s){let v=0;for(let i=0;i<s.length;i++){v=((v<<5)-v)+s.charCodeAt(i);v|=0;}return Math.abs(v);}
function tf(d,k){const p=D.phases[k]||1,pool=SKILLS[k].phases[p];return pool[h(d+k)%pool.length];}
function gd(d){if(!D.days[d]){const t={};SK.forEach(k=>t[k]={text:tf(d,k),done:false});D.days[d]={tasks:t,mood:0,note:''};sv(D);}return D.days[d];}

let cur=td();

function addBonus(date,k){
  const dd=gd(date),task=dd.tasks[k];
  if(!task.bonus)task.bonus=[];
  const p=D.phases[k]||1,pool=SKILLS[k].phases[p];
  const used=new Set([task.text,...task.bonus]);
  const avail=pool.filter(t=>!used.has(t));
  if(!avail.length){task.bonus.push(pool[Math.floor(Math.random()*pool.length)]+' (повтор)');}
  else{task.bonus.push(avail[h(date+k+task.bonus.length)%avail.length]);}
  sv(D);render();
}

function render(){
  const t=td(),dd=gd(cur),tot=df(S0,G0),dn=Math.max(1,df(S0,cur)+1),left=Math.max(0,df(cur,G0));

  document.getElementById('day-badge').textContent=`День ${dn}/${tot}`;
  document.getElementById('d-main').textContent=fmt(cur);
  document.getElementById('d-sub').textContent=cur===t?'Сегодня':'';
  document.getElementById('today-chip').classList.toggle('visible',cur!==t);

  const pct=Math.min(100,Math.round(dn/tot*100));
  document.getElementById('p-pct').textContent=pct+'%';
  document.getElementById('p-fill').style.width=pct+'%';
  document.getElementById('p-left').textContent=left+' дн.';

  const stk=calcStreak();
  const se=document.getElementById('streak');
  if(stk>=3){se.classList.add('visible');document.getElementById('streak-txt').textContent=`${stk} дней подряд! Огонь!`;}
  else se.classList.remove('visible');

  const tl=document.getElementById('tasks');tl.innerHTML='';
  SK.forEach(k=>{
    const sk=SKILLS[k],task=dd.tasks[k];
    if(!task)return;
    const el=document.createElement('div');
    el.className='task'+(task.done?' done':'');el.dataset.skill=k;
    const bonusHtml=(task.bonus||[]).map(b=>`<div class="bonus-item">${b}</div>`).join('');
    el.innerHTML=`<div class="task-emoji">${sk.emoji}</div><div class="task-content"><div class="task-label">${sk.name}</div><div class="task-desc">${task.text}</div><button class="more-btn" data-k="${k}">+ Хочу ещё</button>${bonusHtml?`<div class="bonus-list">${bonusHtml}</div>`:''}</div><div class="task-toggle"></div>`;
    el.querySelector('.task-toggle').addEventListener('click',(e)=>{e.stopPropagation();task.done=!task.done;sv(D);render();if(SK.every(x=>dd.tasks[x]?.done)){confetti();celebrate();}});
    el.querySelector('.more-btn').addEventListener('click',(e)=>{e.stopPropagation();addBonus(cur,k);});
    tl.appendChild(el);
  });

  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.toggle('sel',+b.dataset.m===dd.mood));
  document.getElementById('note').value=dd.note||'';
}

function calcStreak(){let s=0,d=new Date();while(true){const x=ds(d),dd=D.days[x];if(!dd)break;const allDone=SK.every(k=>{const t=dd.tasks[k];return t?t.done:true;});if(!allDone)break;s++;d.setDate(d.getDate()-1);}return s;}

function confetti(){
  const box=document.getElementById('cbox'),cl=['#6C5CE7','#E84393','#00B894','#FD7B33','#0984E3','#FDCB6E','#FF6B6B','#A55EEA','#55EFC4','#FF9FF3'];
  function wave(){for(let i=0;i<80;i++){const c=document.createElement('div');c.className='conf';c.style.left=Math.random()*100+'%';c.style.top=(-10-Math.random()*20)+'px';c.style.background=cl[Math.floor(Math.random()*cl.length)];c.style.animationDelay=Math.random()*0.8+'s';c.style.animationDuration=(2.5+Math.random()*2)+'s';const sz=8+Math.random()*12;c.style.width=sz+'px';c.style.height=sz*(0.4+Math.random()*0.6)+'px';c.style.borderRadius=Math.random()>0.5?'50%':'3px';box.appendChild(c);}}
  wave(); setTimeout(wave,600); setTimeout(wave,1200);
  setTimeout(()=>box.innerHTML='',5000);
}

function celebrate(){
  const s=calcStreak();
  let e='🎆',t='Миша, ты молодец!',sub='Это победа!';
  if(s===7){e='🏆';t='Миша, ты молодец!';sub='Целая неделя! Это победа!';}
  else if(s===14){e='🌟';t='Миша, ты молодец!';sub='Две недели подряд! Это победа!';}
  else if(s===30){e='🚀';t='Миша, ты молодец!';sub='МЕСЯЦ! Это победа!';}
  document.getElementById('t-emo').textContent=e;
  document.getElementById('t-t').textContent=t;
  document.getElementById('t-s').textContent=sub;
  const ov=document.getElementById('fw-overlay');
  const el=document.getElementById('toast');
  ov.classList.add('show');
  requestAnimationFrame(()=>{requestAnimationFrame(()=>{el.classList.add('show');});});
  el.addEventListener('click',()=>{el.classList.remove('show');ov.classList.remove('show');},{once:true});
  ov.addEventListener('click',()=>{el.classList.remove('show');ov.classList.remove('show');},{once:true});
  setTimeout(()=>{el.classList.remove('show');ov.classList.remove('show');},8000);
}

function renderProgress(){
  let balls=0,total=0;const sb={};SK.forEach(k=>sb[k]={d:0,t:0});
  Object.values(D.days).forEach(day=>{SK.forEach(k=>{if(day.tasks[k]){total++;sb[k].t++;if(day.tasks[k].done){balls++;sb[k].d++;const bn=day.tasks[k].bonus?.length||0;balls+=bn;sb[k].d+=bn;sb[k].t+=bn;total+=bn;}}});});
  document.getElementById('s-balls').textContent=balls;
  document.getElementById('s-streak').textContent=calcStreak();
  document.getElementById('s-pct').textContent=total?Math.round(balls/total*100)+'%':'0%';
  document.getElementById('s-left').textContent=Math.max(0,df(td(),G0));

  const bc=document.getElementById('sk-bars');bc.innerHTML='';
  SK.forEach(k=>{const sk=SKILLS[k],p=sb[k].t?Math.round(sb[k].d/sb[k].t*100):0;bc.innerHTML+=`<div class="sk-row"><span class="sk-ico">${sk.emoji}</span><span class="sk-name">${sk.name}</span><div class="sk-track"><div class="sk-fill" style="width:${p}%;background:${sk.color}"></div></div><span class="sk-pct">${p}%</span></div>`;});

  const hm=document.getElementById('heatmap');hm.innerHTML='';
  const start=pd(S0),end=pd(G0),now=new Date(),wd=start.getDay(),off=wd===0?6:wd-1,g=new Date(start);g.setDate(g.getDate()-off);const d=new Date(g);
  while(d<=end){const x=ds(d),div=document.createElement('div');div.className='hm';if(d>now||d<start)div.classList.add('future');else{const dd=D.days[x];if(dd){const n=SK.filter(k=>dd.tasks[k]?.done).length;if(n===SK.length)div.classList.add('full');else if(n>0)div.classList.add('partial');}}hm.appendChild(div);d.setDate(d.getDate()+1);}
}

function renderSettings(){
  const l=document.getElementById('phases');l.innerHTML='';
  SK.forEach(k=>{const sk=SKILLS[k],ph=D.phases[k],mx=Object.keys(sk.phases).length,r=document.createElement('div');r.className='set-row';r.innerHTML=`<div class="set-left"><span class="ico">${sk.emoji}</span><span class="name">${sk.name}</span></div><div style="display:flex;align-items:center;gap:8px"><span class="ph-badge">Фаза ${ph}</span><button class="ph-btn" ${ph>=mx?'disabled':''}>↑</button></div>`;r.querySelector('.ph-btn').addEventListener('click',()=>{if(ph<mx&&confirm(`Фаза ${ph+1} в «${sk.name}»?`)){D.phases[k]=ph+1;sv(D);renderSettings();}});l.appendChild(r);});

// ===== MATH PRACTICE =====
let mathProblems = [];

function genMathProblems(){
  mathProblems = [];
  for(let i=0;i<10;i++){
    const a = 1+Math.floor(Math.random()*14);
    const maxB = 20-a;
    const b = 1+Math.floor(Math.random()*Math.min(maxB,14));
    mathProblems.push({a,b,answer:a+b,userAnswer:null,correct:null});
  }
}

function renderMath(){
  if(!mathProblems.length) genMathProblems();
  const list=document.getElementById('math-list');
  list.innerHTML='';
  let solved=0;
  mathProblems.forEach((p,i)=>{
    if(p.correct) solved++;
    const div=document.createElement('div');
    div.className='math-problem'+(p.correct===true?' correct':'')+(p.correct===false?' wrong':'');
    div.innerHTML=`<div class="math-num">${i+1}</div><div class="math-expr">${p.a} + ${p.b}</div><div class="math-eq">=</div><input class="math-input" type="number" inputmode="numeric" pattern="[0-9]*" maxlength="2" ${p.correct?' disabled value="'+p.answer+'"':'value="'+(p.userAnswer!==null?p.userAnswer:'')+'"'}><div class="math-check-icon">${p.correct===true?'✅':p.correct===false?'❌':''}</div>`;
    const inp=div.querySelector('.math-input');
    inp.addEventListener('input',e=>{
      const v=parseInt(e.target.value);
      if(isNaN(v))return;
      p.userAnswer=v;
      if(v===p.answer){
        p.correct=true;
        div.classList.remove('wrong');
        div.classList.add('correct');
        div.querySelector('.math-check-icon').textContent='✅';
        inp.disabled=true;
        updateMathScore();
        if(mathProblems.every(x=>x.correct)){confetti();celebrate();}
      } else if(e.target.value.length>=String(p.answer).length){
        p.correct=false;
        div.classList.add('wrong');
        div.querySelector('.math-check-icon').textContent='❌';
        setTimeout(()=>{
          p.correct=null;
          div.classList.remove('wrong');
          div.querySelector('.math-check-icon').textContent='';
          e.target.value='';
          e.target.focus();
        },800);
      }
    });
    list.appendChild(div);
  });
  updateMathScore();
}

function updateMathScore(){
  const solved=mathProblems.filter(p=>p.correct).length;
  document.getElementById('m-score').innerHTML='Решено: <b>'+solved+'</b> из <b>10</b>';
}

document.getElementById('math-new').addEventListener('click',()=>{genMathProblems();renderMath();});

const PREPOSITIONS = new Set(['in','on','at','up','to','by','for','from','with','into','onto']);

function highlightEn(text){
  return text.split(' ').map(w=>{
    const clean=w.replace(/[^a-zA-Z]/g,'').toLowerCase();
    const punct=w.replace(/[a-zA-Z]/g,'');
    if(SIGHT_WORDS.has(clean)) return `<span class="sw">${w}</span>`;
    if(PREPOSITIONS.has(clean)) return `<span class="sw2">${w}</span>`;
    return w;
  }).join(' ');
}

function pickSentences(){
  const usedRu=new Set(), usedEn=new Set();
  readState.ru=[];readState.en=[];
  while(readState.ru.length<5){const i=Math.floor(Math.random()*SENTENCES_RU.length);if(!usedRu.has(i)){usedRu.add(i);readState.ru.push({text:SENTENCES_RU[i],done:false});}}
  while(readState.en.length<5){const i=Math.floor(Math.random()*SENTENCES_EN.length);if(!usedEn.has(i)){usedEn.add(i);readState.en.push({text:SENTENCES_EN[i].t,emoji:SENTENCES_EN[i].e,bg:SENTENCES_EN[i].bg||1,done:false});}}
